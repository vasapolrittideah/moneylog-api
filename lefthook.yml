# Lefthook configuration for Go project with golangci-lint and conventional commits
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --fix
      stage_fixed: true
    golangci-fmt:
      glob: "*.go"
      run: golangci-lint fmt
      stage_fixed: true
    go-mod-tidy:
      glob: "{go.mod,go.sum}"
      run: go mod tidy
      stage_fixed: true

